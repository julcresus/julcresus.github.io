    <!-- Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <!-- Preload critical images for faster initial load -->
    <link rel="preload" as="image" href="%PUBLIC_URL%/img/hmrc.webp" type="image/webp">
    <link rel="preload" as="image" href="%PUBLIC_URL%/img/naturalengland.png" type="image/png">
    <link rel="preload" as="image" href="%PUBLIC_URL%/img/defra.webp" type="image/webp">
    <link rel="preload" as="image" href="%PUBLIC_URL%/img/shyl.webp" type="image/webp">

    <!--
      Notice the use of %PUBLIC_URL% in the tags above.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will

    <title>Julien Crésus-Ashton | UX Designer</title>
